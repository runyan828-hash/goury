<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>猫のごーりぃテトリス M</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            overflow: hidden; touch-action: none;
            /* 背景を薄いピンクに変更 */
            background: linear-gradient(180deg, #fff5f7 0%, #fcdee5 100%);
        }
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; /* 上寄せ */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 5px 10px 0 10px;
        }

        h1 { font-size: 14px; color: #4A90E2; text-shadow: 1px 1px white; margin: 2px 0 5px 0; flex-shrink: 0; }

        #main-app {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 450px;
            height: 100%; /* 全体を使って下部に余白を作る */
        }

        /* ゲーム画面とメッセージを一体化 */
        #unified-area {
            width: 100%; flex: 0 1 auto; /* コンテンツに合わせて高さを決める */
            display: flex; flex-direction: column;
            background: #fff; border: 4px solid #fff; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden;
            max-height: 65vh; /* 画面の65%までに制限してボタンを上げる */
        }

        #game-wrapper {
            position: relative; flex: 1; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #fafafa; min-height: 0;
        }

        canvas#game {
            max-width: 100%; max-height: 100%; object-fit: contain; display: block;
        }

        /* スリムかつ文字の大きいメッセージボックス */
        #messageBox {
            width: 100%; height: 50px; display: none; align-items: center;
            gap: 10px; background: #fff; padding: 0 12px;
            border-top: 2px solid #f1f695; flex-shrink: 0;
        }
        #msgImage { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #f1f695; flex-shrink: 0; }
        #message { font-size: 14px; font-weight: bold; color: #E91E63; line-height: 1.2; flex: 1; }

        /* 操作ボタン: 位置を上げて下に余白を確保 */
        #controls {
            width: 100%; display: none; grid-template-columns: repeat(5, 1fr);
            gap: 6px; padding: 10px 0; flex-shrink: 0;
            margin-bottom: 60px; /* 操作ボタンの下に大きな余白を作る（戻るボタン対策） */
        }
        .btn-ctrl {
            background: #7dc9fc; color: white; border: none; border-radius: 10px;
            padding: 18px 0; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px #5ba8d6; cursor: pointer; user-select: none;
        }
        .btn-ctrl:active { transform: translateY(2px); box-shadow: 0 2px #5ba8d6; }
        #btn-rotate { background: #ff9e6d; box-shadow: 0 4px #e68a5c; }
        #btn-pause { background: #95a5a6; box-shadow: 0 4px #7f8c8d; }

        #overlay-screen {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }
        .container {
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 280px;
        }
        .btn-main {
            width: 100%; padding: 12px; font-size: 18px; font-weight: bold; margin-top: 10px;
            background: #ff6ec7; color: white; border: none; border-radius: 50px; cursor: pointer;
        }

        #event-banner {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 3px solid #ff9e6d; padding: 10px; border-radius: 15px;
            z-index: 200; display: none; text-align: center; width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: popIn 0.5s ease-out;
        }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body id="bgBody">

    <h1>🐱 猫のごーりぃテトリス</h1>

    <div id="main-app">
        <div id="unified-area">
            <div id="game-wrapper">
                <div id="overlay-screen">
                    <div class="container" id="screen-content">
                        <h2 style="color:#4A90E2; margin:0 0 5px 0; font-size: 18px;">猫のごーりぃテトリス</h2>
                        <p style="font-size:11px; color:#666;">合理的配慮で、働きやすい職場を ✨</p>
                        <button class="btn-main" onclick="startGame(1)">スタート！</button>
                    </div>
                </div>
                <canvas id="game" width="450" height="600"></canvas>
                <div id="event-banner">
                    <img id="event-icon" src="image/kuma.png" style="width:40px;height:40px;border-radius:50%;border:2px solid #ff9e6d;" />
                    <div style="font-size:13px; color:#E91E63; font-weight:bold; margin-top:5px;">サポート！</div>
                    <div style="font-size:10px; color:#4A90E2;">（あいてる穴を埋めるよ）</div>
                </div>
            </div>

            <div id="messageBox">
                <img id="msgImage" src="image/cat.png" />
                <div id="message">準備中...</div>
            </div>
        </div>

        <div id="controls">
            <button class="btn-ctrl" id="btn-left">⬅</button>
            <button class="btn-ctrl" id="btn-rotate">⟳</button>
            <button class="btn-ctrl" id="btn-right">➡</button>
            <button class="btn-ctrl" id="btn-down">⬇</button>
            <button class="btn-ctrl" id="btn-pause">⏸</button>
        </div>
    </div>

    <audio id="bgm" src="image/bgm.mp3" loop></audio>
    <audio id="tapSound" src="image/tap.mp3" preload="auto"></audio>
    <audio id="lineSound" src="image/line.mp3" preload="auto"></audio>
    <audio id="yaySound" src="image/yay.mp3" preload="auto"></audio>
    <audio id="sapotoSound" src="image/sapoto.mp3" preload="auto"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- メール設定 ---
const MAIL_TO = "goritekihairyo@care-tsuchiya.com";
const MAIL_SUB = "合理的配慮についての相談";
const MAIL_BODY = "障害がある等で仕事上困っていること、配慮して欲しい内容など先ずはご連絡下さい。1週間以内に合理的配慮推進委員会から返事を差し上げます。\n\nお名前：\n相談内容（簡単にで大丈夫）：";

const GAME_WIDTH = 300, SIDEBAR_X = 300, ROWS = 20, COLS = 10, BLOCK = 30;
let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
let dropCounter=0, lastTime=0, score=0, lastEventScore = 0, lastMessageScore = 0;
let baseInterval=800, dropInterval=800;
let highfiveTimer = 0, gameStatus = "start", currentStage = 1, maxStageReached = 1, isPaused = false;
let particles = [];

const starColors = ["#FFE066","#A0E7E5","#FFB3BA","#CBA0FF","#FFDAC1","#FFF3B0","#FFD700","#FF69B4"];

const storyStage1 = [
    {img:"image/kuma.png", text:"日々の業務、お疲れさまです！"},
    {img:"image/inu.png", text:"持病などで困っていることはない？"},
    {img:"image/tori.png", text:"働きやすくなる工夫、一緒に考えよう！"},
    {img:"image/cat.png", text:"『合理的配慮』という制度があるよ"},
    {img:"image/inu.png", text:"もし困っていたら相談してみてね！"}
];
const storyStage2 = [
    {img:"image/neko.png", text:"大切なのは「対話」することだよ！"},
    {img:"image/tori.png", text:"例えば、読みやすい資料を用意したり"},
    {img:"image/kuma.png", text:"静かな場所で作業できるようにしたり"},
    {img:"image/inu.png", text:"障害者手帳があってもなくても"},
    {img:"image/inu.png", text:"先ずは相談してみてね！"}
];

const SHAPES=[
    {shape:[[1,1,1,1]], color:"#FFE066", imgName:"image/cat.png"},
    {shape:[[1,1],[1,1]], color:"#A0E7E5", imgName:"image/neko.png"},
    {shape:[[0,1,0],[1,1,1]], color:"#FFB3BA", imgName:"image/kuma.png"},
    {shape:[[1,0,0],[1,1,1]], color:"#CBA0FF", imgName:"image/inu.png"},
    {shape:[[0,0,1],[1,1,1]], color:"#FFDAC1", imgName:"image/pen.png"},
    {shape:[[0,1,1],[1,1,0]], color:"#e0ffff", imgName:"image/tori.png"},
    {shape:[[1,1,0],[0,1,1]], color:"#FFADAD", imgName:"image/panda.png"}
];
const images = {};
SHAPES.forEach(s => { images[s.color] = new Image(); images[s.color].src = s.imgName; });
const highfiveImg = new Image(); highfiveImg.src = "image/highfive.png";
const gouriImg = new Image(); gouriImg.src = "image/gouri.png";

const bgm = document.getElementById("bgm");
const tapSound = document.getElementById("tapSound");
const lineSound = document.getElementById("lineSound");
const yaySound = document.getElementById("yaySound");
const sapotoSound = document.getElementById("sapotoSound");

bgm.volume = 0.12; tapSound.volume = 0.18; lineSound.volume = 0.50; yaySound.volume = 0.60; sapotoSound.volume = 0.50;

function startGame(stage) {
    gameStatus = "playing"; isPaused = false;
    currentStage = stage; maxStageReached = Math.max(maxStageReached, stage);
    board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
    score = (stage === 1) ? 0 : 300; lastEventScore = score; lastMessageScore = score;
    baseInterval = (stage === 1) ? 800 : 550;
    document.getElementById("bgBody").style.background = (stage === 1) ? "linear-gradient(135deg, #edaac1, #9ff6f6, #f1f695)" : "linear-gradient(135deg, #a1c4fd, #c2e9fb, #f1f695)";
    dropInterval = baseInterval;
    document.getElementById("overlay-screen").style.display = "none";
    document.getElementById("messageBox").style.display = "flex";
    document.getElementById("controls").style.display = "grid";
    bgm.play().catch(()=>{}); updateStoryUI(); requestAnimationFrame(update);
}

function updateStoryUI() {
    const story = (currentStage === 1) ? storyStage1 : storyStage2;
    const step = Math.floor((score - (currentStage === 1 ? 0 : 300)) / 50);
    const current = story[Math.min(step, story.length - 1)];
    if(current) {
        document.getElementById("msgImage").src = current.img;
        document.getElementById("message").textContent = current.text;
    }
}

function fillHoles() {
    for (let x = 0; x < COLS; x++) {
        let found = false;
        for (let y = 0; y < ROWS; y++) {
            if (board[y][x] !== 0) found = true;
            else if (found && board[y][x] === 0) board[y][x] = "#FFB3BA";
        }
    }
}

function triggerEvent() {
    if(gameStatus !== "playing") return;
    setTimeout(() => {
        document.getElementById("event-banner").style.display = "block";
        fillHoles(); sapotoSound.currentTime = 0; sapotoSound.play();
        createStars(30, 300);
        setTimeout(() => { document.getElementById("event-banner").style.display = "none"; }, 2500);
    }, 400);
}

function clearLines() {
    let lines = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(cell => cell !== 0)) {
            board.splice(y, 1); board.unshift(Array(COLS).fill(0));
            createStars(20, y * BLOCK); lines++; y++;
        }
    }
    if (lines > 0) {
        score += lines * 25; lineSound.currentTime = 0; lineSound.play();
        if (score >= lastMessageScore + 50) { updateStoryUI(); lastMessageScore = score; }
        if (lines >= 4) { highfiveTimer = 90; yaySound.currentTime = 0; yaySound.play(); }
        const targets = [100, 200, 400, 500];
        targets.forEach(t => { if (score >= t && lastEventScore < t) triggerEvent(); });
        lastEventScore = score;
        if (score >= 300 && currentStage === 1) { setTimeout(showStageClearScreen, 600); }
        else if (score >= 600) { gameStatus = "clear"; showAllClearScreen(); }
    }
}

function createStars(count, yPos) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * GAME_WIDTH, y: yPos, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
            color: starColors[Math.floor(Math.random() * starColors.length)], size: Math.random() * 8 + 4, life: 60
        });
    }
}

function drawStar(ctx, x, y, r, color) {
    ctx.save(); ctx.fillStyle = color; ctx.beginPath(); ctx.translate(x, y);
    for (let i = 0; i < 5; i++) { ctx.rotate(Math.PI / 5); ctx.lineTo(0, 0 - (r * 0.5)); ctx.rotate(Math.PI / 5); ctx.lineTo(0, 0 - r); }
    ctx.fill(); ctx.restore();
}

function openMail() {
    window.location.href = `mailto:${MAIL_TO}?subject=${encodeURIComponent(MAIL_SUB)}&body=${encodeURIComponent(MAIL_BODY)}`;
}

function showStageClearScreen() {
    gameStatus = "intermission"; yaySound.currentTime = 0; yaySound.play();
    const content = document.getElementById("screen-content");
    content.innerHTML = `<h3 style="color:#E91E63">STAGE 1 クリア! ✨</h3><p style="font-size:13px;">その調子！Stage 2へ進もう！</p><button class="btn-main" onclick="startGame(2)">Stage 2開始</button>`;
    document.getElementById("overlay-screen").style.display = "flex";
}

function showAllClearScreen() {
    yaySound.currentTime = 0; yaySound.play();
    const content = document.getElementById("screen-content");
    content.innerHTML = `<h3 style="color:#E91E63">✨ ALL CLEAR!</h3><button class="btn-main" onclick="openMail()">メールで相談する</button><button class="btn-main" onclick="location.reload()" style="background:#7dc9fc; margin-top:10px;">最初から遊ぶ</button>`;
    document.getElementById("overlay-screen").style.display = "flex";
}

function showGameOverScreen() {
    gameStatus = "gameover";
    const content = document.getElementById("screen-content");
    let btns = `<button class="btn-main" onclick="startGame(1)">最初から</button>`;
    if (maxStageReached >= 2) btns += `<button class="btn-main" style="background:#7dc9fc; margin-top:10px;" onclick="startGame(2)">Stage 2から</button>`;
    content.innerHTML = `<h3 style="color:#666">GAME OVER</h3><p>スコア: ${score}</p>${btns}`;
    document.getElementById("overlay-screen").style.display = "flex";
}

let nextPieceData = SHAPES[Math.floor(Math.random()*SHAPES.length)];
let piece = { shape: nextPieceData.shape, color: nextPieceData.color, x: 3, y: 0 };

function drawBlock(ctx, x, y, color, size = BLOCK) {
    ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(x * size + 0.5, y * size + 0.5, size - 1, size - 1, 4); ctx.fill();
    const img = images[color]; if (img && img.complete) ctx.drawImage(img, x * size + 3, y * size + 3, size - 6, size - 6);
}

function collide(p) {
    return p.shape.some((row, y) => row.some((val, x) => {
        if (val === 0) return false;
        let nx = p.x + x, ny = p.y + y;
        return (nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && board[ny][nx]));
    }));
}

function drawUI() {
    if (highfiveImg.complete) { ctx.save(); ctx.globalAlpha = 0.08; ctx.drawImage(highfiveImg, 20, 150, 260, 260); ctx.restore(); }
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, GAME_WIDTH, 600);
    ctx.fillStyle = "rgba(240, 240, 240, 0.8)"; ctx.fillRect(SIDEBAR_X, 0, 150, 600);
    ctx.strokeStyle = "#eee"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(SIDEBAR_X, 0); ctx.lineTo(SIDEBAR_X, 600); ctx.stroke();
    ctx.fillStyle = "#4A90E2"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
    ctx.fillText("NEXT", SIDEBAR_X + 75, 45);
    const ns = 22;
    nextPieceData.shape.forEach((row, y) => row.forEach((val, x) => {
        if (val) {
            const sx = SIDEBAR_X + 75 - (nextPieceData.shape[0].length * ns)/2;
            ctx.fillStyle = nextPieceData.color; ctx.beginPath(); ctx.roundRect(sx + x*ns, 60 + y*ns, ns-2, ns-2, 4); ctx.fill();
        }
    }));
    ctx.fillStyle = "#ff6ec7"; ctx.beginPath(); ctx.roundRect(SIDEBAR_X + 15, 180, 120, 50, 10); ctx.fill();
    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.fillText("SCORE", SIDEBAR_X + 75, 200); ctx.fillText(score, SIDEBAR_X + 75, 222);
    if (gouriImg.complete) ctx.drawImage(gouriImg, SIDEBAR_X + 15, 270, 120, 120);
    ctx.fillStyle = "#4A90E2"; ctx.beginPath(); ctx.roundRect(SIDEBAR_X + 15, 410, 120, 40, 10); ctx.fill();
    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.fillText("相談する", SIDEBAR_X + 75, 435);
}

function update(time = 0) {
    if (gameStatus !== "playing" || isPaused) {
        if (isPaused) { ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,450,600); ctx.fillStyle="white"; ctx.font="24px Arial"; ctx.textAlign="center"; ctx.fillText("PAUSE", 225, 300); }
        requestAnimationFrame(update); return;
    }
    const delta = time - lastTime; lastTime = time; dropCounter += delta;
    if (dropCounter > dropInterval) {
        piece.y++;
        if (collide(piece)) { 
            piece.y--; piece.shape.forEach((row,y)=>row.forEach((val,x)=>{if(val)board[piece.y+y][piece.x+x]=piece.color;})); 
            clearLines(); 
            const data = nextPieceData;
            nextPieceData = SHAPES[Math.floor(Math.random()*SHAPES.length)];
            piece = { shape: data.shape, color: data.color, x: 3, y: 0 };
            if (collide(piece)) { showGameOverScreen(); }
        }
        dropCounter = 0;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height); drawUI();
    board.forEach((row, y) => row.forEach((val, x) => { if (val) drawBlock(ctx, x, y, val); }));
    piece.shape.forEach((row, y) => row.forEach((val, x) => { if (val) drawBlock(ctx, piece.x+x, piece.y+y, piece.color); }));
    particles.forEach((p, i) => { drawStar(ctx, p.x, p.y, p.size, p.color); p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; if (p.life <= 0) particles.splice(i, 1); });
    if (highfiveTimer > 0) {
        const progress = (90 - highfiveTimer) / 90; const scale = 0.6 + (1 - Math.pow(1-progress,3)) * 0.4 + Math.sin(progress * Math.PI) * 0.08;
        ctx.save(); ctx.globalAlpha = Math.min(1, 0.2 + (1 - Math.pow(1-progress,3)) * 0.8);
        ctx.drawImage(highfiveImg, 150 - (250*scale)/2, 300 - (250*scale)/2, 250*scale, 250*scale); ctx.restore(); highfiveTimer--;
    }
    requestAnimationFrame(update);
}

const move = (dx) => { if(gameStatus==="playing" && !isPaused){ piece.x += dx; if(collide(piece))piece.x-=dx; tapSound.currentTime=0; tapSound.play(); } };
const rotate = () => { if(gameStatus==="playing" && !isPaused){ const old=piece.shape; piece.shape=piece.shape[0].map((_,i)=>piece.shape.map(r=>r[i]).reverse()); if(collide(piece))piece.shape=old; tapSound.currentTime=0; tapSound.play(); } };
const down = () => { if(gameStatus==="playing" && !isPaused){ piece.y++; if(collide(piece))piece.y--; tapSound.currentTime=0; tapSound.play(); } };

const addEv = (id, fn) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); fn(); }, {passive: false});
    el.addEventListener('mousedown', (e) => { e.preventDefault(); fn(); });
};
addEv("btn-left", () => move(-1)); addEv("btn-right", () => move(1)); addEv("btn-rotate", rotate); addEv("btn-down", down); addEv("btn-pause", () => { isPaused = !isPaused; document.getElementById("btn-pause").textContent = isPaused ? "▶" : "⏸"; });

window.addEventListener('keydown', e => { if(e.key === "ArrowLeft") move(-1); if(e.key === "ArrowRight") move(1); if(e.key === "ArrowUp") rotate(); if(e.key === "ArrowDown") down(); });

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    if (x > SIDEBAR_X + 15 && x < SIDEBAR_X + 135 && y > 410 && y < 450) openMail();
});
</script>
</body>
</html>
